spring:
  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    hibernate:
      ddl-auto: none

    flyway:
      enabled: true
      locations: classpath:db/migration
      baseline-on-migrate: true

  datasource:
    url: jdbc:postgresql://localhost:5432/transactions_dev
    driver-class-name: org.postgresql.Driver