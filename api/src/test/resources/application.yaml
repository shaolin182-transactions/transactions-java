spring:
  profiles:
    active: mongodb
  cloud:
    config:
      enabled: false

  jackson:
    deserialization:
      FAIL_ON_UNKNOWN_PROPERTIES: true

  datasource:
    url: jdbc:postgresql://localhost:5432/transactions_dev
    driver-class-name: org.postgresql.Driver

  data:
    mongodb:
      host: localhost
      port: 27017
      database: transactions-dev
      uri: mongodb://localhost:27017/transactions-dev

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://keycloak:8082/auth/realms/transactions
          jwk-set-uri: http://keycloak:8080/auth/realms/transactions/protocol/openid-connect/certs

server:
  port: 9080